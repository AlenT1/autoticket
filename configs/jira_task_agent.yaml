# jira_task_agent shipped defaults.
# Operators do not edit this file — values come from PRs. Operator-specific
# values (Jira host, project key, API keys) live in `.env`.

models:
  classify:  openai/openai/gpt-5.4
  extract:   openai/openai/gpt-5.4
  summarize: openai/openai/gpt-5.4

matcher:
  batch_size: 4
  max_workers: 3
  min_confidence: 0.70
  description_preview_chars: 3000
  completed_epic_statuses:
    - In Staging
    - In Review
    - Done
    - Closed
    - Resolved
    - Cancelled
    - Won't Do
    - Won't Fix

# Set to a Jira issue key to scope all created tasks under it during dev runs.
# Leave null in shipped defaults; CLI's --target-epic flag overrides per run.
target_epic_default: null

# Path to the team-mapping YAML (first-name → Jira username).
team_mapping_path: configs/team_mapping.yaml
